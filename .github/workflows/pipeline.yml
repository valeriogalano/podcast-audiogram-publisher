name: Audiogram Pipeline

on:
  schedule:
    - cron: '0 10 * * 2'  # martedi alle 10:00 UTC: genera
    - cron: '0 10 * * 4'  # giovedi alle 10:00 UTC: pubblica
  workflow_dispatch:
    inputs:
      job:
        description: 'Job da eseguire'
        required: true
        default: 'both'
        type: choice
        options:
          - generate
          - publish
          - both

jobs:
  generate:
    if: github.event_name == 'workflow_dispatch' && (github.event.inputs.job == 'generate' || github.event.inputs.job == 'both') || github.event_name == 'schedule' && github.event.schedule == '0 10 * * 2'
    runs-on: self-hosted
    timeout-minutes: 120

    steps:
      - name: Genera audiogram (ultimo episodio)
        run: |
          cd $HOME/PycharmProjects/pensieriincodice-audiogram-generator
          .venv/bin/python -m audiogram_generator --episode last --soundbites all

  publish:
    if: github.event_name == 'workflow_dispatch' && (github.event.inputs.job == 'publish' || github.event.inputs.job == 'both') || github.event_name == 'schedule' && github.event.schedule == '0 10 * * 4'
    runs-on: self-hosted
    timeout-minutes: 60

    steps:
      - name: Pubblica sui social
        run: |
          cd $HOME/PycharmProjects/podcast-audiogram-publisher
          .venv/bin/python -m publisher
